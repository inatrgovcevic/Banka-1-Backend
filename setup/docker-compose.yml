# PR_19 C19.1: shared YAML anchor za JVM/resource-limit boilerplate kroz svih 7
# Spring Boot servisa. UseG1GC + MaxRAMPercentage=70 daje stabilno ponasanje pod
# container memory limit-om (cgroup v1/v2 detekcija je default u Java 17+).
x-jvm-tuning: &jvm-tuning
  JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0 -XX:+UseG1GC -XX:+UseStringDeduplication -XX:MaxGCPauseMillis=200"

x-app-resource-limits: &app-resource-limits
  resources:
    limits:
      memory: 512M
    reservations:
      memory: 256M

services:
  # =========================================================================
  # Shared infrastructure (postgres, rabbitmq, observability stack)
  # =========================================================================

  # Single Postgres instance — all services share this container, each with its own database
  postgres:
    image: postgres:16-alpine
    container_name: banka_postgres
    restart: unless-stopped
    # PR_19 C19.1: tuned za 7-servis konsolidaciju + observability stack:
    #   - max_connections=200 (dovoljno: 7 services × 10 HikariCP pool size = 70 + headroom)
    #     pre PR_19 bilo 1000 sto je trazilo ~640 MB samo za connection slot-ove.
    #   - shared_buffers=128MB pre default 25% RAM-a (radi sa 512M container limit-om).
    #   - work_mem=4MB konzervativno za connection-heavy workload.
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "${DB_EX_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Toxiproxy — TCP proxy for SAGA integration tests (SG-09b/c, SG-10).
  # Admin API on :8474; proxied ports configured at test runtime.
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.10.0
    container_name: banka_toxiproxy
    restart: unless-stopped
    ports:
      - "8474:8474"   # admin API
      - "18084:18084" # banking-core proxy port (tests configure at runtime)
      - "18088:18088" # trading-service proxy port (tests configure at runtime)
    networks:
      - banka-network

  # Redis (shared L2 cache — koristi se za market-service stock price feed cache).
  # Alpine image, no persistence (cache-only, ne treba durability).
  redis:
    image: redis:7-alpine
    container_name: banka_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - banka-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M

  # RabbitMQ (shared, koristi se za saga.events i notification events)
  # PR_19 C19.1: alpine variant + memory cap. RabbitMQ erlang VM ima sopstveni
  # high-watermark mehanizam — postavljen na 75% container limit-a.
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: banka_rabbitmq
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      # PR_19 C19.1: VM_MEMORY_HIGH_WATERMARK env var je deprecated u 3.x —
      # configuration ide kroz rabbitmq.conf ili rabbitmq.env. Container memory
      # cap (deploy.resources.limits.memory) je dovoljan za hard limit.
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_HOST_MANAGEMENT_PORT:-15672}:15672"
    networks:
      - banka-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M

  # PR_19 C19.1: observability stack memory caps. otel-collector + jaeger su
  # tipicno light; prometheus/loki/grafana drze in-memory cache pa dobijaju vise.
  otel-collector:
    image: otel/opentelemetry-collector:0.104.0
    container_name: banka_otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    expose:
      - "4318"
      - "8889"
    depends_on:
      - jaeger
    networks:
      - banka-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: banka_jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
      MEMORY_MAX_TRACES: "10000"
    expose:
      - "4317"
    ports:
      - "16686:16686"
    networks:
      - banka-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: banka_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=512MB"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    networks:
      - banka-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: banka_alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    depends_on:
      - discord-alert-bot
    networks:
      - banka-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  discord-alert-bot:
    build:
      context: ..
      dockerfile: discord-alert-bot/Dockerfile
    container_name: banka_discord_alert_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DEVELOPER_DISCORD_ID: ${DEVELOPER_DISCORD_ID:-}
      PORT: 9094
    expose:
      - "9094"
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9094/health > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  loki:
    image: grafana/loki:3.1.1
    container_name: banka_loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - banka-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # PR_02 C2.16: promtail mount-uje samo 7 servisnih log volumes (umesto 11).
  promtail:
    image: grafana/promtail:3.1.1
    container_name: banka_promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
      - notification-service-logs:/var/log/services/notification:ro
      - user-service-logs:/var/log/services/user:ro
      - banking-core-service-logs:/var/log/services/banking-core:ro
      - market-service-logs:/var/log/services/market:ro
      - trading-service-logs:/var/log/services/trading:ro
      - credit-service-logs:/var/log/services/credit:ro
      - saga-orchestrator-service-logs:/var/log/services/saga:ro
      - interbank-service-logs:/var/log/services/interbank:ro
    depends_on:
      - loki
    networks:
      - banka-network
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  grafana:
    image: grafana/grafana:11.1.0
    container_name: banka_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - jaeger
      - loki
    networks:
      - banka-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # =========================================================================
  # Application services (7 servisa, posle PR_02 konsolidacije 15→7)
  # =========================================================================

  # 1/7. Notification Service (Go rewrite)
  notification-service:
    build:
      context: ..
      dockerfile: notification-service-go/Dockerfile
    container_name: notification-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NOTIFICATION_SERVICE_HOST: ${NOTIFICATION_SERVICE_HOST:-0.0.0.0}
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVER_PORT:-8006}
      SERVER_PORT: ${NOTIFICATION_SERVER_PORT:-8006}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-notification_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      NOTIFICATION_QUEUE: ${NOTIFICATION_QUEUE:-notification-service-queue}
      NOTIFICATION_EXCHANGE: ${NOTIFICATION_EXCHANGE:-employee.events}
      NOTIFICATION_ROUTING_KEY: ${NOTIFICATION_ROUTING_KEY:-employee.#}
      NOTIFICATION_CLIENT_ROUTING_KEY: ${NOTIFICATION_CLIENT_ROUTING_KEY:-client.#}
      NOTIFICATION_CARD_ROUTING_KEY: ${NOTIFICATION_CARD_ROUTING_KEY:-card.#}
      NOTIFICATION_CREDIT_ROUTING_KEY: ${NOTIFICATION_CREDIT_ROUTING_KEY:-credit.#}
      NOTIFICATION_ORDER_ROUTING_KEY: ${NOTIFICATION_ORDER_ROUTING_KEY:-order.#}
      NOTIFICATION_TAX_ROUTING_KEY: ${NOTIFICATION_TAX_ROUTING_KEY:-tax.#}
      NOTIFICATION_OTC_ROUTING_KEY: ${NOTIFICATION_OTC_ROUTING_KEY:-otc.#}
      NOTIFICATION_VERIFICATION_ROUTING_KEY: ${NOTIFICATION_VERIFICATION_ROUTING_KEY:-verification.#}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: notification-service
      LOGGING_FILE_PATH: /var/log/banka
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-true}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      otel-collector: { condition: service_started }
    expose:
      - "${NOTIFICATION_SERVER_PORT:-8006}"
    networks:
      - banka-network
    volumes:
      - notification-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --timeout=3 -O- http://localhost:${NOTIFICATION_SERVER_PORT:-8006}/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy: *app-resource-limits

  # 2/7. User Service (employee + client; PR_02 C2.3+)
  user-service:
    build:
      context: ..
      dockerfile: user-service-go/Dockerfile
      args:
        SERVER_PORT: ${USER_SERVICE_PORT:-8081}
    container_name: banka_user_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${USER_SERVICE_PORT:-8081}
      USER_SERVICE_DB_HOST: postgres
      USER_SERVICE_DB_PORT: ${USER_SERVICE_DB_PORT:-5432}
      USER_SERVICE_DB_NAME: ${USER_SERVICE_DB_NAME:-user_service}
      USER_SERVICE_DB_USER: ${USER_SERVICE_DB_USER:-postgres}
      USER_SERVICE_DB_PASSWORD: ${USER_SERVICE_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_REFRESH_EXPIRATION_DAYS: ${TOKEN_REFRESH_EXPIRATION_DAYS:-7}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      LIQUIBASE_CONTEXTS: ${LIQUIBASE_CONTEXTS:-dev}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      NOTIFICATION_QUEUE: ${NOTIFICATION_QUEUE:-notification-service-queue}
      NOTIFICATION_EXCHANGE: ${NOTIFICATION_EXCHANGE:-employee.events}
      NOTIFICATION_ROUTING_KEY: ${NOTIFICATION_ROUTING_KEY:-employee.#}
      USER_RESET_PASSWORD_URL: ${USER_RESET_PASSWORD_URL:-http://localhost:3000/reset-password?token=}
      USER_ACTIVATE_ACCOUNT_URL: ${USER_ACTIVATE_ACCOUNT_URL:-http://localhost:3000/activate?token=}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: user-service
      LOGGING_FILE_PATH: /var/log/banka
      BANKA_SECURITY_CORS_ALLOWED_ORIGINS: ${BANKA_SECURITY_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:3000}
      BANKA_SECURITY_CORS_ALLOWED_METHODS: ${BANKA_SECURITY_CORS_ALLOWED_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
      BANKA_SECURITY_CORS_ALLOW_CREDENTIALS: ${BANKA_SECURITY_CORS_ALLOW_CREDENTIALS:-true}
      <<: *jvm-tuning
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      otel-collector: { condition: service_started }
    expose:
      - "${USER_SERVICE_PORT:-8081}"
    networks:
      - banka-network
    volumes:
      - user-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${USER_SERVICE_PORT:-8081}/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy: *app-resource-limits

  # 3/7. Banking Core Service (account + card + transaction + transfer + verification; PR_02 C2.10+)
  banking-core-service:
    build:
      context: ..
      dockerfile: banking-core-service-go/Dockerfile
      args:
        SERVER_PORT: ${BANKING_CORE_SERVICE_PORT:-8084}
    container_name: banka_banking_core_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${BANKING_CORE_SERVICE_PORT:-8084}
      BANKING_CORE_DB_HOST: postgres
      BANKING_CORE_DB_PORT: ${BANKING_CORE_DB_PORT:-5432}
      BANKING_CORE_DB_NAME: ${BANKING_CORE_DB_NAME:-banking_core}
      BANKING_CORE_DB_USER: ${BANKING_CORE_DB_USER:-postgres}
      BANKING_CORE_DB_PASSWORD: ${BANKING_CORE_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      LIQUIBASE_CONTEXTS: ${LIQUIBASE_CONTEXTS:-dev}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      NOTIFICATION_QUEUE: ${NOTIFICATION_QUEUE:-notification-service-queue}
      NOTIFICATION_EXCHANGE: ${NOTIFICATION_EXCHANGE:-employee.events}
      NOTIFICATION_ROUTING_KEY: ${NOTIFICATION_ROUTING_KEY:-employee.#}
      SERVICES_USER_URL: http://user-service:${USER_SERVICE_PORT:-8081}
      CARD_REQUEST_VERIFICATION_EXPIRATION_MINUTES: ${CARD_REQUEST_VERIFICATION_EXPIRATION_MINUTES:-15}
      CARD_CREATION_AUTOMATIC_DEFAULT_LIMIT: ${CARD_CREATION_AUTOMATIC_DEFAULT_LIMIT:-1000000}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: banking-core-service
      LOGGING_FILE_PATH: /var/log/banka
      # margin_transactions tabela nije pokrivena Liquibase changelog-om iz
      # legacy modula; ddl-auto=update auto-kreira missing tabele pa Hibernate
      # schema validation prolazi. NE menja kolone na postojecim tabelama jer
      # entiteti su vec usaglaseni sa Liquibase shemom.
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      <<: *jvm-tuning
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      user-service: { condition: service_healthy }
      otel-collector: { condition: service_started }
    expose:
      - "${BANKING_CORE_SERVICE_PORT:-8084}"
    networks:
      - banka-network
    volumes:
      - banking-core-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${BANKING_CORE_SERVICE_PORT:-8084}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    # PR_19 C19.1: banking-core sluzi vise paketa (account+card+tx+transfer+verification)
    # pa dobija veci limit nego ostali servisi (768M umesto 512M).
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M

  # 4/7. Market Service (stock + exchange; Go implementation)
  market-service:
    build:
      context: ..
      dockerfile: market-service-go/Dockerfile
      args:
        SERVER_PORT: ${MARKET_SERVICE_PORT:-8085}
    container_name: banka_market_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${MARKET_SERVICE_PORT:-8085}
      GRPC_PORT: ${MARKET_SERVICE_GRPC_PORT:-9085}
      MARKET_SERVICE_DB_HOST: postgres
      MARKET_SERVICE_DB_PORT: ${MARKET_SERVICE_DB_PORT:-5432}
      MARKET_SERVICE_DB_NAME: ${MARKET_SERVICE_DB_NAME:-market_service}
      MARKET_SERVICE_DB_USER: ${MARKET_SERVICE_DB_USER:-postgres}
      MARKET_SERVICE_DB_PASSWORD: ${MARKET_SERVICE_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      LIQUIBASE_CONTEXTS: ${LIQUIBASE_CONTEXTS:-dev}
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      STOCK_MARKET_DATA_BASE_URL: ${STOCK_MARKET_DATA_BASE_URL:-https://www.alphavantage.co}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      STOCK_PRICE_CACHE_TTL_SECONDS: ${STOCK_PRICE_CACHE_TTL_SECONDS:-15}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: market-service
      LOGGING_FILE_PATH: /var/log/banka
      <<: *jvm-tuning
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      otel-collector: { condition: service_started }
    expose:
      - "${MARKET_SERVICE_PORT:-8085}"
    networks:
      - banka-network
    volumes:
      - market-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${MARKET_SERVICE_PORT:-8085}/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy: *app-resource-limits

  # Optional second Go instance for side-by-side validation on alternate ports.
  # It is not part of the default stack and does not receive gateway traffic.
  market-service-go:
    profiles: ["go-market"]
    build:
      context: ..
      dockerfile: market-service-go/Dockerfile
    container_name: banka_market_service_go
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${MARKET_SERVICE_GO_PORT:-18085}
      GRPC_PORT: ${MARKET_SERVICE_GO_GRPC_PORT:-19085}
      MARKET_SERVICE_DB_HOST: postgres
      MARKET_SERVICE_DB_PORT: ${MARKET_SERVICE_DB_PORT:-5432}
      MARKET_SERVICE_DB_NAME: ${MARKET_SERVICE_DB_NAME:-market_service}
      MARKET_SERVICE_DB_USER: ${MARKET_SERVICE_DB_USER:-postgres}
      MARKET_SERVICE_DB_PASSWORD: ${MARKET_SERVICE_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      STOCK_MARKET_DATA_BASE_URL: ${STOCK_MARKET_DATA_BASE_URL:-https://www.alphavantage.co}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      STOCK_PRICE_CACHE_TTL_SECONDS: ${STOCK_PRICE_CACHE_TTL_SECONDS:-15}
      EXCHANGE_RATES_FETCH_ON_STARTUP: ${EXCHANGE_RATES_FETCH_ON_STARTUP:-true}
      EXCHANGE_RATES_FETCH_CRON: ${EXCHANGE_RATES_FETCH_CRON:-0 0 8 * * *}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "${MARKET_SERVICE_GO_PORT:-18085}:${MARKET_SERVICE_GO_PORT:-18085}"
      - "${MARKET_SERVICE_GO_GRPC_PORT:-19085}:${MARKET_SERVICE_GO_GRPC_PORT:-19085}"
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${MARKET_SERVICE_GO_PORT:-18085}/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 5/7. Trading Service — Go (trading-service-go). P8 cut-over: promoted to the
  # canonical trading-service on :8088, mirroring how market-service / user-service
  # were cut over to Go. It owns the `trading` schema via its own migrations
  # (baseline-skips the existing Java Liquibase schema; creates it on a fresh DB).
  # The Java trading-service/ source stays in the repo but is no longer built here.
  # api-gateway and interbank-service keep targeting trading-service:8088 — now Go —
  # so neither needs changing. ROLLBACK = restore `dockerfile: trading-service/Dockerfile`
  # + the curl healthcheck, drop GRPC_PORT, then rebuild this service.
  trading-service:
    build:
      context: ..
      dockerfile: trading-service-go/Dockerfile
    container_name: banka_trading_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${TRADING_SERVICE_PORT:-8088}
      GRPC_PORT: ${TRADING_SERVICE_GRPC_PORT:-9088}
      TRADING_DB_HOST: postgres
      TRADING_DB_PORT: ${TRADING_DB_PORT:-5432}
      TRADING_DB_NAME: ${TRADING_DB_NAME:-trading}
      TRADING_DB_USER: ${TRADING_DB_USER:-postgres}
      TRADING_DB_PASSWORD: ${TRADING_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      BANKA_SECURITY_ISSUER: ${BANKA_SECURITY_ISSUER:-banka1}
      BANKA_SECURITY_ID_CLAIM: ${BANKA_SECURITY_ID_CLAIM:-id}
      BANKA_SECURITY_ROLES_CLAIM: ${BANKA_SECURITY_ROLES_CLAIM:-roles}
      BANKA_SECURITY_PERMISSIONS_CLAIM: ${BANKA_SECURITY_PERMISSIONS_CLAIM:-permissions}
      BANKA_SECURITY_CORS_ALLOWED_ORIGINS: ${BANKA_SECURITY_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:3000}
      # Dev-seed gate for the Go migration runner (same signal Java used): a value
      # containing "dev" applies 002_devseed_trading.sql on a fresh DB. Set a non-dev
      # value (e.g. prod) to keep demo fixtures out of a production database.
      LIQUIBASE_CONTEXTS: ${LIQUIBASE_CONTEXTS:-dev}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      NOTIFICATION_EXCHANGE: ${NOTIFICATION_EXCHANGE:-employee.events}
      NOTIFICATION_ORDER_ROUTING_KEY: ${NOTIFICATION_ORDER_ROUTING_KEY:-order.#}
      NOTIFICATION_TAX_ROUTING_KEY: ${NOTIFICATION_TAX_ROUTING_KEY:-tax.#}
      BANKA_TAX_CAPITAL_GAINS_RATE: ${BANKA_TAX_CAPITAL_GAINS_RATE:-0.15}
      SAGA_EVENTS_EXCHANGE: ${SAGA_EVENTS_EXCHANGE:-saga.events}
      SAGA_RESULTS_EXCHANGE: ${SAGA_RESULTS_EXCHANGE:-saga.exchange}
      OTC_CONTRACT_EXPIRATION_NOTIFICATION_DAYS: ${OTC_CONTRACT_EXPIRATION_NOTIFICATION_DAYS:-3}
      BANKA1_ROUTING_NUMBER: ${BANKA1_ROUTING_NUMBER:-111}
      # P8 cut-over: Go owns the scheduled + saga work now (Java trading retired), so
      # the six coexistence gates are ON. Set any to false to hand that job back.
      ORDER_SCHEDULERS_ENABLED: ${ORDER_SCHEDULERS_ENABLED:-true}
      TAX_SCHEDULER_ENABLED: ${TAX_SCHEDULER_ENABLED:-true}
      FUND_SAGA_CONSUMERS_ENABLED: ${FUND_SAGA_CONSUMERS_ENABLED:-true}
      FUND_SNAPSHOT_SCHEDULER_ENABLED: ${FUND_SNAPSHOT_SCHEDULER_ENABLED:-true}
      OTC_SAGA_CONSUMERS_ENABLED: ${OTC_SAGA_CONSUMERS_ENABLED:-true}
      OTC_SCHEDULERS_ENABLED: ${OTC_SCHEDULERS_ENABLED:-true}
      SERVICES_USER_URL: http://user-service:${USER_SERVICE_PORT:-8081}
      SERVICES_BANKING_CORE_URL: http://banking-core-service:${BANKING_CORE_SERVICE_PORT:-8084}
      SERVICES_MARKET_URL: http://market-service:${MARKET_SERVICE_PORT:-8085}
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      banking-core-service: { condition: service_healthy }
      market-service: { condition: service_healthy }
      otel-collector: { condition: service_started }
    expose:
      - "${TRADING_SERVICE_PORT:-8088}"
      - "${TRADING_SERVICE_GRPC_PORT:-9088}"
    networks:
      - banka-network
    volumes:
      - trading-service-logs:/var/log/banka
    healthcheck:
      # distroless runtime has no shell/curl: the binary self-probes liveness.
      test: ["CMD", "/app/trading-service-go", "-healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy: *app-resource-limits

  # 6/7. Credit Service (Go rewrite)
  credit-service:
    build:
      context: ../credit-service-go
      dockerfile: Dockerfile
    container_name: banka_credit_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CREDIT_SERVER_PORT: ${CREDIT_SERVER_PORT:-8089}
      SERVER_PORT: ${CREDIT_SERVER_PORT:-8089}
      CREDIT_DB_HOST: postgres
      CREDIT_DB_PORT: 5432
      CREDIT_DB_NAME: ${CREDIT_DB_NAME:-credit_db}
      CREDIT_DB_USER: ${CREDIT_DB_USER:-postgres}
      CREDIT_DB_PASSWORD: ${CREDIT_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      LIQUIBASE_CONTEXTS: ${LIQUIBASE_CONTEXTS:-dev}
      SERVICES_USER_URL: http://user-service:${USER_SERVICE_PORT:-8081}
      SERVICES_BANKING_CORE_URL: http://banking-core-service:${BANKING_CORE_SERVICE_PORT:-8084}
      SERVICES_MARKET_URL: http://market-service:${MARKET_SERVICE_PORT:-8085}
      # Legacy aliasi: pre-PR_20 konsolidacije account/verification je bio
      # deo zasebnih modula koji su sada u banking-core-service; exchange je
      # spojen u market-service. credit-service code i dalje cita stare
      # SERVICES_* env imena pa ih mapiramo na nove servise.
      SERVICES_ACCOUNT_URL: http://banking-core-service:${BANKING_CORE_SERVICE_PORT:-8084}
      SERVICES_VERIFICATION_URL: http://banking-core-service:${BANKING_CORE_SERVICE_PORT:-8084}
      SERVICES_EXCHANGE_URL: http://market-service:${MARKET_SERVICE_PORT:-8085}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      NOTIFICATION_QUEUE: ${NOTIFICATION_QUEUE:-notification-service-queue}
      NOTIFICATION_EXCHANGE: ${NOTIFICATION_EXCHANGE:-employee.events}
      NOTIFICATION_ROUTING_KEY: ${NOTIFICATION_ROUTING_KEY:-employee.#}
      RABBITMQ_EXCHANGE: ${NOTIFICATION_EXCHANGE:-employee.events}
      RABBITMQ_ROUTING_KEY: ${NOTIFICATION_CREDIT_ROUTING_KEY:-credit.#}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: credit-service
      LOGGING_FILE_PATH: /var/log/banka
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      banking-core-service: { condition: service_healthy }
      otel-collector: { condition: service_started }
    expose:
      - "${CREDIT_SERVER_PORT:-8089}"
    networks:
      - banka-network
    volumes:
      - credit-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --timeout=3 -O- http://localhost:${CREDIT_SERVER_PORT:-8089}/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy: *app-resource-limits

  # 7/7. Saga Orchestrator Service — Go rewrite (PR_GO_02; replaces Spring Boot build).
  # Build context is the workspace root (Banka-1-Backend-go/) so that the
  # go.work workspace and all local modules are available to the multi-stage Dockerfile.
  # Env vars use the SAGA_* prefix consumed by shared/config.Load.
  # NOTE: Sub-struct fields are double-prefixed by envconfig:
  #   Config.Saga.RabbitMQURL          → SAGA_SAGA_RABBITMQ_URL
  #   Config.Saga.Services.BankingCoreURL → SAGA_SAGA_SERVICES_BANKING_CORE_URL
  #   Config.Saga.Cleanup.Interval     → SAGA_SAGA_CLEANUP_INTERVAL
  # Spring Boot vars (JAVA_TOOL_OPTIONS, SPRING_PROFILES_ACTIVE, RABBITMQ_HOST, etc.)
  # are intentionally omitted — the Go binary does not use them.
  saga-orchestrator-service:
    build:
      context: ..
      dockerfile: saga-orchestrator-service/Dockerfile
    container_name: saga-orchestrator-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # --- Database (Goose runs migrations on startup) ---
      SAGA_DB_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${SAGA_POSTGRES_DB:-saga_db}?sslmode=disable"
      SAGA_DB_MAX_CONNS: "${SAGA_DB_MAX_CONNS:-10}"
      SAGA_DB_MIN_CONNS: "${SAGA_DB_MIN_CONNS:-2}"
      # --- Migrations path (absolute; matches /migrations in the Docker image) ---
      SAGA_SERVER_MIGRATIONS_PATH: "/migrations"
      # --- HTTP server ---
      SAGA_SERVER_HTTP_PORT: "${SAGA_SERVER_PORT:-8095}"
      SAGA_SERVER_LOG_LEVEL: "${SAGA_LOG_LEVEL:-info}"
      SAGA_SERVER_LOG_JSON: "true"
      # --- JWT (S2S issuance only — saga-orchestrator is not a user-facing service) ---
      SAGA_JWT_SECRET: "${JWT_SECRET}"
      SAGA_JWT_ISSUER: "${SAGA_JWT_ISSUER:-banka1}"
      # --- Profile (controls prod-secret strictness in config.Load) ---
      SAGA_PROFILE: "${SAGA_PROFILE:-dev}"
      # --- RabbitMQ broker URL (double-prefix: Config.Saga.RabbitMQURL) ---
      SAGA_SAGA_RABBITMQ_URL: "amqp://${RABBITMQ_USERNAME:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:${RABBITMQ_PORT:-5672}/"
      # --- Downstream Java service URLs (double-prefix: Config.Saga.Services.*) ---
      SAGA_SAGA_SERVICES_BANKING_CORE_URL: "http://banking-core-service:${BANKING_CORE_SERVICE_PORT:-8084}"
      SAGA_SAGA_SERVICES_TRADING_URL: "http://trading-service:${TRADING_SERVICE_PORT:-8088}"
      SAGA_SAGA_SERVICES_MARKET_URL: "http://market-service:${MARKET_SERVICE_PORT:-8085}"
      SAGA_SAGA_SERVICES_TIMEOUT: "${SAGA_SERVICES_TIMEOUT:-30s}"
      # --- Cleanup scheduler (double-prefix: Config.Saga.Cleanup.*) ---
      SAGA_SAGA_CLEANUP_INTERVAL: "${SAGA_CLEANUP_INTERVAL:-15m}"
      SAGA_SAGA_CLEANUP_STUCK_CUTOFF: "${SAGA_STUCK_CUTOFF:-1h}"
      SAGA_SAGA_CLEANUP_IDEMPOTENCY_RETENTION: "${SAGA_IDEMPOTENCY_RETENTION:-336h}"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      banking-core-service: { condition: service_healthy }
      trading-service: { condition: service_healthy }
      market-service: { condition: service_healthy }
      otel-collector: { condition: service_started }
    expose:
      - "${SAGA_SERVER_PORT:-8095}"
    ports:
      - "${SAGA_SERVER_PORT:-8095}:${SAGA_SERVER_PORT:-8095}"
    networks:
      - banka-network
    healthcheck:
      # Alpine image provides wget; /health is served by api.NewRouter.
      # NOTE: --spider sends HEAD which chi router doesn't auto-route to GET handler.
      # Use full GET via -O- and discard output instead.
      test: ["CMD-SHELL", "wget --quiet --tries=1 --timeout=3 -O- http://localhost:${SAGA_SERVER_PORT:-8095}/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    # Go binary is ~20 MB static + alpine runtime; 128 MB is generous headroom.
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # 8/8. Interbank Service — Go rewrite (Task 23; replaces Java/Spring Boot build).
  # Build context is the workspace root (Banka-1-Backend-go/) so that the
  # go.work workspace and all local modules (interbank-service/, shared/, proto/)
  # are available to the multi-stage Dockerfile.
  # Env vars use the INTERBANK_* prefix consumed by shared/config.Load.
  # Spring Boot vars (JAVA_TOOL_OPTIONS, SPRING_PROFILES_ACTIVE, SWAGGER_ENABLED,
  # LIQUIBASE_CONTEXTS, RABBITMQ_*, LOGGING_FILE_PATH) are intentionally omitted —
  # the Go binary does not use them.
  interbank-service:
    build:
      context: ..
      dockerfile: interbank-service/Dockerfile
    container_name: banka_interbank_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # --- Database (Goose runs migrations on startup) ---
      INTERBANK_DB_URL: "postgres://${INTERBANK_DB_USER:-postgres}:${INTERBANK_DB_PASSWORD:-postgres}@postgres:5432/${INTERBANK_DB_NAME:-interbank_service}?sslmode=disable"
      INTERBANK_DB_MAX_CONNS: "${INTERBANK_DB_MAX_CONNS:-10}"
      INTERBANK_DB_MIN_CONNS: "${INTERBANK_DB_MIN_CONNS:-2}"
      # --- Migrations path (absolute; matches /migrations in the Docker image) ---
      INTERBANK_SERVER_MIGRATIONS_PATH: "/migrations"
      # --- HTTP server ---
      INTERBANK_SERVER_HTTP_PORT: "${INTERBANK_SERVER_PORT:-8091}"
      INTERBANK_SERVER_LOG_LEVEL: "${INTERBANK_LOG_LEVEL:-info}"
      INTERBANK_SERVER_LOG_JSON: "true"
      # --- JWT (S2S issuance + FE token verification) ---
      INTERBANK_JWT_SECRET: "${JWT_SECRET}"
      INTERBANK_JWT_ISSUER: "${INTERBANK_JWT_ISSUER:-banka1}"
      # --- Profile (controls partner-token strictness in config.Load) ---
      INTERBANK_PROFILE: "${INTERBANK_PROFILE:-dev}"
      # --- Our bank identity ---
      # NOTE: envconfig nests sub-struct fields under their parent name, so
      # Config.Interbank.X reads from INTERBANK_INTERBANK_X (double prefix).
      INTERBANK_INTERBANK_MY_ROUTING_NUMBER: "${BANKA1_ROUTING_NUMBER:-111}"
      INTERBANK_INTERBANK_MY_BANK_DISPLAY_NAME: "${BANKA1_DISPLAY_NAME:-Banka 1}"
      # --- Partner bank (Banka 2) — JSON form fallback. envconfig slice-of-struct
      # binding (`INTERBANK_INTERBANK_PARTNERS_0_*`) ne radi za []Partner pa
      # config.Load() konzumira INTERBANK_PARTNERS_JSON kao single-string array.
      INTERBANK_PARTNERS_JSON: '[{"Routing":${BANKA2_ROUTING_NUMBER:-222},"DisplayName":"${BANKA2_DISPLAY_NAME:-Banka 2}","BaseURL":"${BANKA2_BASE_URL:-http://interbank-service:8091/_mock/banka2/}","InboundToken":"${BANKA2_INBOUND_TOKEN:-dev-inbound-banka2-to-banka1}","OutboundToken":"${BANKA2_OUTBOUND_TOKEN:-dev-outbound-banka1-to-banka2}"}]'
      # --- Mock partner (in-process Banka 2 simulator; enable for dev/e2e) ---
      INTERBANK_INTERBANK_MOCK_PARTNER_ENABLED: "${INTERBANK_MOCK_PARTNER_ENABLED:-false}"
      # --- Downstream Java service URLs ---
      INTERBANK_INTERBANK_SERVICES_BANKING_CORE_URL: "http://banking-core-service:${BANKING_CORE_SERVICE_PORT:-8084}"
      INTERBANK_INTERBANK_SERVICES_TRADING_URL: "http://trading-service:${TRADING_SERVICE_PORT:-8088}"
      INTERBANK_INTERBANK_SERVICES_USER_URL: "http://user-service:${USER_SERVICE_PORT:-8081}"
      INTERBANK_INTERBANK_SERVICES_TIMEOUT: "${INTERBANK_SERVICES_TIMEOUT:-5s}"
      # --- Outbound HTTP client (accept can block up to 60 s) ---
      INTERBANK_INTERBANK_OUTBOUND_TIMEOUT: "${INTERBANK_OUTBOUND_TIMEOUT:-60s}"
      # --- Retry scheduler ---
      INTERBANK_INTERBANK_RETRY_INTERVAL: "${INTERBANK_RETRY_INTERVAL:-2m}"
      INTERBANK_INTERBANK_RETRY_MAX_RETRIES: "${INTERBANK_RETRY_MAX_RETRIES:-5}"
    depends_on:
      postgres: { condition: service_healthy }
      banking-core-service: { condition: service_healthy }
      trading-service: { condition: service_healthy }
      user-service: { condition: service_healthy }
      otel-collector: { condition: service_started }
    expose:
      - "${INTERBANK_SERVER_PORT:-8091}"
    networks:
      - banka-network
    healthcheck:
      # Alpine image provides wget; /health is served by api.NewRouter.
      # NOTE: --spider sends HEAD which chi router doesn't auto-route to GET handler.
      # Use full GET via -O- and discard output instead.
      test: ["CMD-SHELL", "wget --quiet --tries=1 --timeout=3 -O- http://localhost:${INTERBANK_SERVER_PORT:-8091}/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    # Go binary is ~15 MB static + alpine runtime; 128 MB is generous headroom.
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # =========================================================================
  # API Gateway (Nginx) — depends on svih 8 servisa
  # =========================================================================
  api-gateway:
    build:
      context: ..
      dockerfile: api-gateway/Dockerfile
    container_name: banka_api_gateway
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:-80}:80"
    env_file:
      - .env
    environment:
      USER_SERVICE_PORT: ${USER_SERVICE_PORT:-8081}
      BANKING_CORE_SERVICE_PORT: ${BANKING_CORE_SERVICE_PORT:-8084}
      MARKET_SERVICE_PORT: ${MARKET_SERVICE_PORT:-8085}
      TRADING_SERVICE_PORT: ${TRADING_SERVICE_PORT:-8088}
      CREDIT_SERVER_PORT: ${CREDIT_SERVER_PORT:-8089}
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVER_PORT:-8006}
      SAGA_SERVICE_PORT: ${SAGA_SERVER_PORT:-8095}
      INTERBANK_SERVICE_PORT: ${INTERBANK_SERVER_PORT:-8091}
    depends_on:
      user-service: { condition: service_healthy }
      market-service: { condition: service_healthy }
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/gateway-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    # PR_19 C19.1: Nginx je tankak — 64M za worker process-e + buffer-e je preobilato.
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M


networks:
  banka-network:
    driver: bridge

volumes:
  postgres-data:
  grafana-data:
  loki-data:
  prometheus-data:
  alertmanager-data:
  notification-service-logs:
  user-service-logs:
  banking-core-service-logs:
  market-service-logs:
  trading-service-logs:
  credit-service-logs:
  saga-orchestrator-service-logs:
  interbank-service-logs:
