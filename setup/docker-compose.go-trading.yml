# Overlay for the future trading-service-go service.
#
# NOT loaded by default. When trading-service-go is ready, opt in with:
#
#   docker compose --env-file .\setup\.env `
#     -f .\setup\docker-compose.yml `
#     -f .\setup\docker-compose.go-trading.yml `
#     --profile go-trading `
#     up -d trading-service-go
#
# Java trading-service remains the default upstream until trading-service-go is
# implemented and intentionally switched in the api-gateway.
#
# This file is NOT linted by docker compose config unless explicitly passed via -f,
# so it is safe to keep here even before trading-service-go/Dockerfile exists.

services:
  trading-service-go:
    profiles: ["go-trading"]
    build:
      # Repo root context (matches market-service-go) so the sibling go-platform/
      # module referenced by the replace directive is inside the build context.
      context: ..
      dockerfile: trading-service-go/Dockerfile
    container_name: banka_trading_service_go
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${TRADING_SERVICE_GO_PORT:-18088}
      GRPC_PORT: ${TRADING_SERVICE_GO_GRPC_PORT:-19088}
      TRADING_DB_HOST: postgres
      TRADING_DB_PORT: ${TRADING_DB_PORT:-5432}
      TRADING_DB_NAME: ${TRADING_DB_NAME:-trading}
      TRADING_DB_USER: ${TRADING_DB_USER:-postgres}
      TRADING_DB_PASSWORD: ${TRADING_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      BANKA_SECURITY_ISSUER: ${BANKA_SECURITY_ISSUER:-banka1}
      BANKA_SECURITY_ID_CLAIM: ${BANKA_SECURITY_ID_CLAIM:-id}
      BANKA_SECURITY_ROLES_CLAIM: ${BANKA_SECURITY_ROLES_CLAIM:-roles}
      BANKA_SECURITY_PERMISSIONS_CLAIM: ${BANKA_SECURITY_PERMISSIONS_CLAIM:-permissions}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      NOTIFICATION_EXCHANGE: ${NOTIFICATION_EXCHANGE:-employee.events}
      NOTIFICATION_ORDER_ROUTING_KEY: ${NOTIFICATION_ORDER_ROUTING_KEY:-order.#}
      NOTIFICATION_TAX_ROUTING_KEY: ${NOTIFICATION_TAX_ROUTING_KEY:-tax.#}
      # P4 tax: capital-gains rate (banka.tax.capital-gains-rate, default 0.15) and
      # the monthly-collection scheduler gate. Scheduler OFF during coexistence —
      # Java still runs the same monthly job on the same rows; flip on at cut-over.
      BANKA_TAX_CAPITAL_GAINS_RATE: ${BANKA_TAX_CAPITAL_GAINS_RATE:-0.15}
      TAX_SCHEDULER_ENABLED: ${TAX_SCHEDULER_ENABLED:-false}
      # P5 funds: saga delivery + consumer/scheduler gates.
      #   SAGA_EVENTS_EXCHANGE  — publish: fund.subscribe.requested,
      #                           fund.redeem.requested, fund.redeem.with-liquidation.requested
      #   SAGA_RESULTS_EXCHANGE — consume: saga.FUND_SUBSCRIBE.STEP_1.fund.{success,failure},
      #                           saga.FUND_REDEEM.STEP_1.fund.{success,failure},
      #                           saga.FUND_LIQUIDATION_FOR_REDEMPTION.STEP_2.fund.success,
      #                           saga.FUND_LIQUIDATION_FOR_REDEMPTION.STEP_X.fund.failure
      # FUND_SAGA_CONSUMERS_ENABLED gates the Go saga consumers. OFF during
      # coexistence: Java RabbitListeners own the trading.fund.* durable queues; if
      # both Go and Java bind, the broker round-robins → half-processed sagas.
      # Flip to true at cut-over.
      # FUND_SNAPSHOT_SCHEDULER_ENABLED gates the daily fund-value snapshot cron
      # (0 10 0 * * *). OFF during coexistence — Java runs the same daily job on the
      # same rows. Flip to true at cut-over.
      SAGA_EVENTS_EXCHANGE: ${SAGA_EVENTS_EXCHANGE:-saga.events}
      SAGA_RESULTS_EXCHANGE: ${SAGA_RESULTS_EXCHANGE:-saga.exchange}
      FUND_SAGA_CONSUMERS_ENABLED: ${FUND_SAGA_CONSUMERS_ENABLED:-false}
      FUND_SNAPSHOT_SCHEDULER_ENABLED: ${FUND_SNAPSHOT_SCHEDULER_ENABLED:-false}
      # P6 OTC: reuses SAGA_EVENTS_EXCHANGE (saga.events) for BOTH the premium/
      # exercise saga publishes AND the result consumers (unlike funds, whose
      # results land on saga.exchange), and NOTIFICATION_EXCHANGE for the
      # otc.{countered,accepted,canceled,expiry_reminder} notifications.
      #   OTC_SAGA_CONSUMERS_ENABLED gates the three Go consumers on the
      #     trading.otc.{premium.completed,premium.failed,exercise.completed} durable
      #     queues. OFF during coexistence — Java RabbitListeners own them; binding
      #     from both sides would round-robin → half-processed contracts.
      #   OTC_SCHEDULERS_ENABLED gates the expire-overdue (0 5 0) + expiry-reminder
      #     (0 30 8) crons. OFF during coexistence — Java runs the same jobs.
      #   OTC mutations themselves are NOT gated (matches the P3 order / P5 funds
      #     precedent; the shared `portfolio` writes are correct under FOR UPDATE).
      # Flip the gates to true at cut-over.
      OTC_SAGA_CONSUMERS_ENABLED: ${OTC_SAGA_CONSUMERS_ENABLED:-false}
      OTC_SCHEDULERS_ENABLED: ${OTC_SCHEDULERS_ENABLED:-false}
      OTC_CONTRACT_EXPIRATION_NOTIFICATION_DAYS: ${OTC_CONTRACT_EXPIRATION_NOTIFICATION_DAYS:-3}
      # P7 interbank: this bank's routing number (banka1 = 111), advertised in the
      # /internal/interbank/public-stocks foreign-bank id (C-<userId>). Matches the
      # interbank-service BANKA1_ROUTING_NUMBER. The /internal/interbank/* endpoints
      # are SERVICE-gated and synchronous (no saga / scheduler / consumer) — no other
      # new env for P7.
      BANKA1_ROUTING_NUMBER: ${BANKA1_ROUTING_NUMBER:-111}
      SERVICES_USER_URL: http://user-service:${USER_SERVICE_PORT:-8081}
      SERVICES_BANKING_CORE_URL: http://banking-core-service:${BANKING_CORE_SERVICE_PORT:-8084}
      SERVICES_MARKET_URL: http://market-service:${MARKET_SERVICE_PORT:-8085}
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    ports:
      - "${TRADING_SERVICE_GO_PORT:-18088}:${TRADING_SERVICE_GO_PORT:-18088}"
      - "${TRADING_SERVICE_GO_GRPC_PORT:-19088}:${TRADING_SERVICE_GO_GRPC_PORT:-19088}"
    networks:
      - banka-network
    healthcheck:
      # distroless runtime has no shell/curl: the binary self-probes liveness.
      test: ["CMD", "/app/trading-service-go", "-healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
