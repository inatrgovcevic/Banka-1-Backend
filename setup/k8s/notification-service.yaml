apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: banka-1
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8006
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: banka-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/raf-si-2025/banka-1-notification-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8006
          env:
            - name: NOTIFICATION_SERVICE_HOST
              value: 0.0.0.0
            - name: NOTIFICATION_SERVICE_PORT
              value: "8006"
            - name: SERVER_PORT
              value: "8006"
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: host
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: port
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: dbname
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: password
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: RABBITMQ_PASSWORD
            - name: NOTIFICATION_QUEUE
              value: notification-service-queue
            - name: NOTIFICATION_EXCHANGE
              value: employee.events
            - name: NOTIFICATION_ROUTING_KEY
              value: employee.#
            - name: NOTIFICATION_CLIENT_ROUTING_KEY
              value: client.#
            - name: NOTIFICATION_CARD_ROUTING_KEY
              value: card.#
            - name: NOTIFICATION_CREDIT_ROUTING_KEY
              value: credit.#
            - name: NOTIFICATION_ORDER_ROUTING_KEY
              value: order.#
            - name: NOTIFICATION_TAX_ROUTING_KEY
              value: tax.#
            - name: NOTIFICATION_OTC_ROUTING_KEY
              value: otc.#
            - name: NOTIFICATION_VERIFICATION_ROUTING_KEY
              value: verification.#
            - name: NOTIFICATION_ACCOUNT_ROUTING_KEY
              value: account.#
            - name: NOTIFICATION_TRANSACTION_ROUTING_KEY
              value: transaction.#
            - name: NOTIFICATION_PRICE_ROUTING_KEY
              value: price.#
            - name: MAIL_HOST
              value: smtp.gmail.com
            - name: MAIL_PORT
              value: "587"
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: MAIL_USERNAME
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: MAIL_PASSWORD
            - name: MAIL_SMTP_STARTTLS
              value: "true"
            - name: MAIL_SMTP_AUTH
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
