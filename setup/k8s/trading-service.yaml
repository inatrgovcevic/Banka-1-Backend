apiVersion: v1
kind: Service
metadata:
  name: trading-service
  namespace: banka-1
spec:
  selector:
    app: trading-service
  ports:
    - name: http
      port: 8088
      targetPort: http
    - name: grpc
      port: 9088
      targetPort: grpc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-service
  namespace: banka-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-service
  template:
    metadata:
      labels:
        app: trading-service
    spec:
      containers:
        - name: trading-service
          image: ghcr.io/raf-si-2025/banka-1-trading-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8088
            - name: grpc
              containerPort: 9088
          env:
            - name: SERVER_PORT
              value: "8088"
            - name: GRPC_PORT
              value: "9088"
            - name: TRADING_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: host
            - name: TRADING_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: port
            - name: TRADING_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: dbname
            - name: TRADING_DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: user
            - name: TRADING_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: password
            - name: TRADING_DB_SSLMODE
              value: require
            - name: LIQUIBASE_CONTEXTS
              value: dev
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: JWT_SECRET
            - name: BANKA_SECURITY_ISSUER
              value: banka1
            - name: BANKA_SECURITY_ID_CLAIM
              value: id
            - name: BANKA_SECURITY_ROLES_CLAIM
              value: roles
            - name: BANKA_SECURITY_PERMISSIONS_CLAIM
              value: permissions
            - name: BANKA_SECURITY_EXPIRATION_TIME
              value: "3600000"
            - name: BANKA_SECURITY_CORS_ALLOWED_ORIGINS
              value: https://banka-1.radenkovic.rs
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: RABBITMQ_PASSWORD
            - name: NOTIFICATION_EXCHANGE
              value: employee.events
            - name: SAGA_EVENTS_EXCHANGE
              value: saga.events
            - name: SAGA_RESULTS_EXCHANGE
              value: saga.exchange
            - name: SERVICES_USER_URL
              value: http://user-service:8081
            - name: SERVICES_BANKING_CORE_URL
              value: http://banking-core-service:8084
            - name: SERVICES_MARKET_URL
              value: http://market-service:8085
            - name: BANKA_TAX_CAPITAL_GAINS_RATE
              value: "0.15"
            - name: OTC_CONTRACT_EXPIRATION_NOTIFICATION_DAYS
              value: "3"
            - name: BANKA1_ROUTING_NUMBER
              value: "111"
            - name: ORDER_SCHEDULERS_ENABLED
              value: "true"
            - name: TAX_SCHEDULER_ENABLED
              value: "true"
            - name: FUND_SAGA_CONSUMERS_ENABLED
              value: "true"
            - name: FUND_SNAPSHOT_SCHEDULER_ENABLED
              value: "true"
            - name: OTC_SAGA_CONSUMERS_ENABLED
              value: "true"
            - name: OTC_SCHEDULERS_ENABLED
              value: "true"
            - name: RECURRING_ORDER_SCHEDULER_ENABLED
              value: "true"
            - name: DIVIDEND_SCHEDULER_ENABLED
              value: "true"
            - name: AUDIT_CONSUMER_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
