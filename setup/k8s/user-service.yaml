apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: banka-1
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 8081
      targetPort: http
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: banka-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/raf-si-2025/banka-1-user-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: USER_SERVICE_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: host
            - name: USER_SERVICE_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: port
            - name: USER_SERVICE_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: dbname
            - name: USER_SERVICE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: user
            - name: USER_SERVICE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: password
            - name: POSTGRES_SSLMODE
              value: require
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: JWT_SECRET
            - name: BANKA_SECURITY_ISSUER
              value: banka1
            - name: BANKA_SECURITY_ID
              value: id
            - name: BANKA_SECURITY_ROLES_CLAIM
              value: roles
            - name: BANKA_SECURITY_PERMISSIONS_CLAIM
              value: permissions
            - name: BANKA_SECURITY_EXPIRATION_TIME
              value: "3600000"
            - name: TOKEN_REFRESH_EXPIRATION_DAYS
              value: "7"
            - name: SERVICES_TRADING_URL
              value: http://trading-service:8088
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: RABBITMQ_PASSWORD
            - name: NOTIFICATION_EXCHANGE
              value: employee.events
            - name: USER_RESET_PASSWORD_URL
              value: https://banka-1.radenkovic.rs/auth/reset-password?token=
            - name: USER_ACTIVATE_ACCOUNT_URL
              value: https://banka-1.radenkovic.rs/auth/activate-account?token=
            - name: CLIENT_RESET_PASSWORD_URL
              value: https://banka-1.radenkovic.rs/auth/reset-password?token=
            - name: CLIENT_ACTIVATE_ACCOUNT_URL
              value: https://banka-1.radenkovic.rs/auth/activate-client?token=
            - name: BANKA_SECURITY_CORS_ALLOWED_ORIGINS
              value: https://banka-1.radenkovic.rs
            - name: ACCOUNT_LOCKOUT_MAX_ATTEMPTS
              value: "5"
            - name: ACCOUNT_LOCKOUT_DURATION_MINUTES
              value: "10"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
