apiVersion: v1
kind: Service
metadata:
  name: credit-service
  namespace: banka-1
spec:
  selector:
    app: credit-service
  ports:
    - name: http
      port: 8089
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-service
  namespace: banka-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: credit-service
  template:
    metadata:
      labels:
        app: credit-service
    spec:
      containers:
        - name: credit-service
          image: ghcr.io/raf-si-2025/banka-1-credit-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8089
          env:
            - name: CREDIT_SERVER_PORT
              value: "8089"
            - name: SERVER_PORT
              value: "8089"
            - name: CREDIT_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: host
            - name: CREDIT_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: port
            - name: CREDIT_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: dbname
            - name: CREDIT_DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: user
            - name: CREDIT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-pguser-db
                  key: password
            - name: CREDIT_DB_SSLMODE
              value: require
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: JWT_SECRET
            - name: SERVICES_USER_URL
              value: http://user-service:8081
            - name: SERVICES_ACCOUNT_URL
              value: http://banking-core-service:8084
            - name: SERVICES_EXCHANGE_URL
              value: http://market-service:8085
            - name: SERVICES_BANKING_CORE_URL
              value: http://banking-core-service:8084
            - name: SERVICES_MARKET_URL
              value: http://market-service:8085
            - name: SERVICES_VERIFICATION_URL
              value: http://banking-core-service:8084
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_EXCHANGE
              value: employee.events
            - name: RABBITMQ_ROUTING_KEY
              value: credit.#
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
