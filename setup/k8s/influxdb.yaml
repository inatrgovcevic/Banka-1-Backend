apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: banka-1
spec:
  selector:
    app: influxdb
  ports:
    - name: http
      port: 8086
      targetPort: http
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: influxdb-data
  namespace: banka-1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: banka-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
        - name: influxdb
          image: influxdb:2.7
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8086
          env:
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: setup
            - name: DOCKER_INFLUXDB_INIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: INFLUX_ADMIN_USERNAME
            - name: DOCKER_INFLUXDB_INIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: INFLUX_ADMIN_PASSWORD
            - name: DOCKER_INFLUXDB_INIT_ORG
              value: banka1
            - name: DOCKER_INFLUXDB_INIT_BUCKET
              value: market_data
            - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: banka-app-secrets
                  key: INFLUX_ADMIN_TOKEN
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb2
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: 192Mi
            limits:
              memory: 384Mi
      volumes:
        - name: influxdb-data
          persistentVolumeClaim:
            claimName: influxdb-data
