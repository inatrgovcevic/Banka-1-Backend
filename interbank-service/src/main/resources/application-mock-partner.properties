# PR_32 Phase 9: Mock-partner profile.
#
# Aktivira se sa SPRING_PROFILES_ACTIVE=dev,mock-partner (ili samo `mock-partner`).
# Cilj: interbank-service zove samog sebe na /_mock/banka2/ rutu umesto da
# zove stvarnu Banka 2 instancu. Omogucava local dev loop bez deploy-a
# partner servisa.
#
# MockBanka2Controller je @Profile("mock-partner") guarded — bez ovog
# profila te rute uopste ne postoje kao @RestController bean-ovi.

# Outbound base-url pokazuje na nas sopstveni proces (loopback).
# 8091 je server.port default; ako je override-ovan kroz SERVER_PORT env var,
# placeholder ce pratiti — ali zato sto se base-url binduje pri startup-u,
# vrednost zavisi od SERVER_PORT environment vrednosti, ne od runtime promene.
#
# KRITICNO: Spring Boot @ConfigurationProperties list binding tretira partial
# override profile property-ja kao zamenu CIJELOG elementa liste — ako redefinies
# samo `partners[0].base-url`, ostali fieldovi (routing-number, inbound-token...)
# postaju null. Zbog toga MORAMO da re-definisemo SVE partner fieldove ovde da
# bismo overrid-ovali samo base-url u mock-partner profilu.
interbank.partners[0].routing-number=${BANKA2_ROUTING_NUMBER:222}
interbank.partners[0].display-name=${BANKA2_DISPLAY_NAME:Banka 2}
interbank.partners[0].base-url=http://localhost:${SERVER_PORT:8091}/_mock/banka2/
interbank.partners[0].inbound-token=${BANKA2_INBOUND_TOKEN:dev-inbound-banka2-to-banka1}
interbank.partners[0].outbound-token=${BANKA2_OUTBOUND_TOKEN:dev-outbound-banka1-to-banka2}

# Mock rute moraju biti permit-all jer ih security-lib apiChain (@Order(2))
# inace zahteva JWT. /_mock/banka2/** je dev-only ruta i ne odlazi van procesa.
banka.security.permit-all=/auth/*,/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html,/actuator/health/liveness,/actuator/health/readiness,/actuator/info,/_mock/**
