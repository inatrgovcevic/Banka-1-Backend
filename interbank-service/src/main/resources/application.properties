spring.application.name=interbank-service
server.port=${SERVER_PORT:8091}

# --- Database -----------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${INTERBANK_DB_HOST:postgres}:${INTERBANK_DB_PORT:5432}/${INTERBANK_DB_NAME:interbank_service}
spring.datasource.username=${INTERBANK_DB_USER:postgres}
spring.datasource.password=${INTERBANK_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Liquibase migrira semu; Hibernate samo validira.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.liquibase.change-log=classpath:db/changelog/db-changelog-interbank.xml
spring.liquibase.contexts=${LIQUIBASE_CONTEXTS:dev}

# --- Jackson — CRITICAL: BigDecimal precision za inter-bank protokol ----------
# Tim 2 §12.1: floats moraju biti deserializovani kao BigDecimal (ne double),
# jer monetarne vrednosti u JSON payload-ima ne smeju da gube preciznost.
#
# NAPOMENA Jackson 3 / Spring Boot 4: `WRITE_BIGDECIMAL_AS_PLAIN` je u Jackson 3
# premesten iz `SerializationFeature` u `StreamWriteFeature` (parent paket),
# i Spring Boot 4 ga ne expose-uje kroz `spring.jackson.*` namespace.
# `use-big-decimal-for-floats` i dalje radi kroz DeserializationFeature.
# Druga polovina (write-as-plain) se ukljucuje kroz {@link InterbankJacksonConfig}
# JsonMapperBuilderCustomizer bean.
spring.jackson.deserialization.use-big-decimal-for-floats=true

# --- Security: shared JWT secret za service-to-service auth ------------------
jwt.secret=${JWT_SECRET}
banka.security.expiration-time=3600000
banka.security.issuer=banka1
banka.security.id=id
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
# Inter-bank rute koriste X-Api-Key auth (validira InterbankAuthFilter, NE JWT),
# pa moraju biti u permit-all listi da security-lib JWT chain (@Order 2) ih ne
# odbije pre nego sto naš @Order(0) InterbankSecurityChain stigne da uradi posao.
# Fix od Tim 2 (Luka, 2026-05-11): bez ovih rutta naš filter chain nikad ne
# dobije priliku da validira X-Api-Key.
banka.security.permit-all=/auth/*,/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html,/actuator/health/liveness,/actuator/health/readiness,/actuator/info,/interbank/**,/interbank,/public-stock,/public-stock/,/negotiations/**,/negotiations

# --- Inter-bank konfiguracija ------------------------------------------------
# Moj routing number + display name.
interbank.my-routing-number=${BANKA1_ROUTING_NUMBER:111}
interbank.my-bank-display-name=${BANKA1_DISPLAY_NAME:Banka 1}

# Partner banka (Banka 2 - Tim 2).
# TODO Phase 4: dodati @PostConstruct fail-fast u InterbankProperties za prod
# profil (per HOTFIX 11/12 pattern) — dev default tokeni `dev-inbound-...` su
# kraci od spec D4 min 32 karaktera i ne treba da se koriste van dev profila.
interbank.partners[0].routing-number=${BANKA2_ROUTING_NUMBER:222}
interbank.partners[0].display-name=${BANKA2_DISPLAY_NAME:Banka 2}
interbank.partners[0].base-url=${BANKA2_BASE_URL:http://localhost:8091/_mock/banka2/}
interbank.partners[0].inbound-token=${BANKA2_INBOUND_TOKEN:dev-inbound-banka2-to-banka1}
interbank.partners[0].outbound-token=${BANKA2_OUTBOUND_TOKEN:dev-outbound-banka1-to-banka2}

# --- Internal service URLs ---------------------------------------------------
services.banking-core.url=${SERVICES_BANKING_CORE_URL:http://banking-core-service:8084}
services.trading.url=${SERVICES_TRADING_URL:http://trading-service:8088}
services.user.url=${SERVICES_USER_URL:http://user-service:8081}

# --- RabbitMQ (za opcione notifikacije) --------------------------------------
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# --- Swagger -----------------------------------------------------------------
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
server.forward-headers-strategy=FRAMEWORK

# --- Actuator ----------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# --- Logging -----------------------------------------------------------------
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
logging.level.com.banka1.interbank=INFO
