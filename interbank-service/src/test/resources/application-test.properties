# PR_32 Phase 1: test profil za interbank-service.
#
# H2 in-memory u PostgreSQL kompat. modu — Liquibase iskljucen jer ce SQL
# changeset-i pisati PostgreSQL-specific tipove (JSONB, BIGSERIAL) koje H2 ne
# razume bez dodatnih tweak-ova. Pravi integration testovi koji testiraju
# Liquibase semu ce koristiti Testcontainers postgres (Phase 6+).
spring.datasource.url=jdbc:h2:mem:interbank_testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

spring.liquibase.enabled=false

# Dummy JWT secret za context-load test.
jwt.secret=test-secret-key-for-integration-tests-32-chars-min

# Dummy inter-bank konfiguracija da @ConfigurationProperties ne pada na binding-u.
interbank.my-routing-number=111
interbank.my-bank-display-name=Banka 1 (test)
interbank.partners[0].routing-number=222
interbank.partners[0].display-name=Banka 2 (test)
interbank.partners[0].base-url=http://localhost:0/banka2/
interbank.partners[0].inbound-token=test-inbound
interbank.partners[0].outbound-token=test-outbound

# Iskljuci RabbitMQ auto-config u testovima — context-load ne treba broker.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
