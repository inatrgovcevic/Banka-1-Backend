## PR_08 C8.2: shared security headers + rate-limit map.
## Ovo se include-uje na vrhu default.conf.template-a kako bi sve location
## block-ove pokupile zajednicke add_header direktive i rate-limit zone.

# --- Rate-limit zones ------------------------------------------------------
# Per-IP zone za auth endpoint-e (login, password reset).
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
# Per-IP zone za API endpoint-e (sve ostalo).
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/s;
# Connection limit per IP.
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# --- Security headers (apply na server level) ------------------------------
# X-Frame-Options: clickjacking zastita.
add_header X-Frame-Options "DENY" always;
# X-Content-Type-Options: sprecava MIME-sniffing.
add_header X-Content-Type-Options "nosniff" always;
# Referrer-Policy: ne prosledjuje URL-ove kao referrer cross-origin.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# Permissions-Policy: onemoguci geolocation, camera, microphone, payment API.
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
# Strict-Transport-Security (HSTS): production HTTPS samo. Disabled u dev/HTTP.
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
# Content-Security-Policy: restriktivan; UI build mora da inline minimum.
add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'" always;

# --- Gzip ------------------------------------------------------------------
gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    application/json
    application/javascript
    application/xml
    application/xhtml+xml
    text/css
    text/plain
    text/javascript
    text/xml;
gzip_vary on;
