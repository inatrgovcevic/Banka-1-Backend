name: ci-go

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'go-platform/**'
      - 'user-service-go/**'
      - 'banking-core-service-go/**'
      - 'market-service-go/**'
      - 'trading-service-go/**'
      - 'credit-service-go/**'
      - 'notification-service-go/**'
      - 'interbank-service/**'
      - 'saga-orchestrator-service/**'
      - 'shared/**'
      - 'go.work'
      - 'proto/**'
      - '.github/workflows/ci-go.yml'
      - '.github/workflows/cd-go.yml'
  push:
    branches: [go, main, backendNew]
    paths:
      - 'go-platform/**'
      - 'user-service-go/**'
      - 'banking-core-service-go/**'
      - 'market-service-go/**'
      - 'trading-service-go/**'
      - 'credit-service-go/**'
      - 'notification-service-go/**'
      - 'interbank-service/**'
      - 'saga-orchestrator-service/**'
      - 'shared/**'
      - 'go.work'
      - 'proto/**'
      - '.github/workflows/ci-go.yml'
      - '.github/workflows/cd-go.yml'

jobs:
  test:
    name: test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: go-platform
            dir: go-platform
          - module: proto
            dir: proto
          - module: shared
            dir: shared
          - module: user-service-go
            dir: user-service-go
          - module: banking-core-service-go
            dir: banking-core-service-go
          - module: market-service-go
            dir: market-service-go
          - module: trading-service-go
            dir: trading-service-go
          - module: credit-service-go
            dir: credit-service-go
          - module: notification-service-go
            dir: notification-service-go
          - module: interbank-service
            dir: interbank-service
          - module: saga-orchestrator-service
            dir: saga-orchestrator-service
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
          cache: true
          cache-dependency-path: ${{ matrix.dir }}/go.sum

      - name: install buf
        if: matrix.module == 'proto'
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.50.0

      - name: buf lint
        if: matrix.module == 'proto'
        working-directory: proto
        run: buf lint

      - name: buf generate
        if: matrix.module == 'proto'
        working-directory: proto
        run: buf generate

      - name: go vet
        working-directory: ${{ matrix.dir }}
        env:
          GOWORK: off
        run: go vet ./...

      - name: go build
        working-directory: ${{ matrix.dir }}
        env:
          GOWORK: off
        run: go build ./...

      - name: go test
        working-directory: ${{ matrix.dir }}
        env:
          GOWORK: off
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
          SAGA_DB_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
        run: go test ./... -count=1
