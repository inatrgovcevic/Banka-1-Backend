name: ci-go
on:
  pull_request:
    paths:
      - 'interbank-service/**'
      - 'saga-orchestrator-service/**'
      - 'shared/**'
      - 'proto/**'
      - '.github/workflows/ci-go.yml'
  push:
    branches: [go, main, backendNew]
    paths:
      - 'interbank-service/**'
      - 'saga-orchestrator-service/**'
      - 'shared/**'
      - 'proto/**'
      - '.github/workflows/ci-go.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'interbank-service/go.mod'
          cache: true
      - name: install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.50.0
      - name: buf lint
        run: |
          cd proto
          buf lint
      - name: buf generate
        run: |
          cd proto
          buf generate
      - name: go vet
        run: go vet ./interbank-service/... ./saga-orchestrator-service/... ./shared/... ./proto/...
      - name: go build
        run: go build ./interbank-service/... ./saga-orchestrator-service/... ./shared/... ./proto/...
      - name: go test (full)
        run: go test ./interbank-service/... ./saga-orchestrator-service/... ./shared/... ./proto/... -count=1
        env:
          TEST_DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable"
  docker-build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker build interbank-service
        run: |
          docker build \
            -f interbank-service/Dockerfile \
            -t banka1-interbank-service:ci \
            .
