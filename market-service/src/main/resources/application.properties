spring.application.name=marketService
server.port=${SERVER_PORT:8085}

# Allow overriding for consolidated modules (stock-service + exchange-service)
spring.main.allow-bean-definition-overriding=true

# --- Security -------------------------------------------------------------
jwt.secret=${JWT_SECRET}
banka.security.issuer=banka1
banka.security.id=id
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.expiration-time=3600000

# Permit-all spaja:
#   - /stocks/public/* (market data koje zahteva neautorizovan UI listing widget)
#   - /exchange/rates/current (zajednicki public dashboard)
#   - swagger + actuator probes (PR_01 C1.2)
banka.security.permit-all=/stocks/public/**,/stocks/internal/**,/internal/calculate/**,/exchange/rates/current,/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html,/actuator/health/liveness,/actuator/health/readiness,/actuator/info

# --- Swagger / OpenAPI (PR_01 C1.5) ---------------------------------------
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.config-url=/market/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/market/v3/api-docs
server.forward-headers-strategy=FRAMEWORK

# --- Actuator (PR_01 C1.2) ------------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# --- Observability (OTEL) -------------------------------------------------
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}

# --- External market data API endpointi --------------------------------
# AlphaVantage (stock prices, OHLC), TwelveData (FX rates).
# Production deploy mora imati pravi API ključ; dev runs koriste mock kontroler.
twelve.data.api.key=${TWELVE_DATA_API_KEY:}
alpha.vantage.api.key=${ALPHA_VANTAGE_API_KEY:}
stock.market-data.base-url=${STOCK_MARKET_DATA_BASE_URL:https://www.alphavantage.co}
stock.market-data.api-key=${STOCK_MARKET_DATA_API_KEY:${ALPHA_VANTAGE_API_KEY:}}
stock.market-data.alpha-vantage-api-key=${ALPHA_VANTAGE_API_KEY:}
stock.market-data.daily-history-limit=${STOCK_MARKET_DATA_DAILY_HISTORY_LIMIT:30}

# --- Stock-service legacy config (PR_19 C19.X konsolidacija) -------------
# ExchangeService client: stock-service code calls /exchange API. Posto je sve u istom JVM-u,
# loopback URL na sebe (8085). Ostaje konfigurabilno za testove.
stock.exchange-service.base-url=${STOCK_EXCHANGE_SERVICE_URL:http://localhost:8085}
stock.exchange-seed.enabled=${STOCK_EXCHANGE_SEED_ENABLED:true}
stock.exchange-seed.csv-location=${STOCK_EXCHANGE_SEED_CSV_LOCATION:classpath:seed/exchanges.csv}
stock.ticker-seed.enabled=${STOCK_TICKER_SEED_ENABLED:true}
stock.option-seed.enabled=${STOCK_OPTION_SEED_ENABLED:true}
stock.futures-seed.enabled=${STOCK_FUTURES_SEED_ENABLED:true}
stock.futures-seed.csv-location=${STOCK_FUTURES_SEED_CSV_LOCATION:classpath:seed/future_data.csv}
stock.forex-seed.enabled=${STOCK_FOREX_SEED_ENABLED:true}
stock.listing-refresh.enabled=${STOCK_LISTING_REFRESH_ENABLED:true}
stock.listing-refresh.interval-ms=${STOCK_LISTING_REFRESH_INTERVAL_MS:900000}

# --- Exchange-service legacy config (PR_19 C19.X) ------------------------
exchange.rates.twelve-data-base-url=${EXCHANGE_TWELVE_DATA_BASE_URL:https://api.twelvedata.com}
exchange.rates.twelve-data-api-key=${TWELVE_DATA_API_KEY:${ALPHA_VANTAGE_API_KEY:}}
exchange.rates.margin-percentage=${EXCHANGE_MARGIN_PERCENTAGE:1.0}
exchange.rates.commission-percentage=${EXCHANGE_COMMISSION_PERCENTAGE:0.70}
exchange.rates.fetch-cron=${EXCHANGE_RATES_FETCH_CRON:0 0 8 * * *}
exchange.rates.fetch-on-startup=${EXCHANGE_RATES_FETCH_ON_STARTUP:true}

company.observability.starter.user-id-mdc-enabled=true

# Listings refresh interval (15 min — spec)
market.refresh.interval-ms=${MARKET_REFRESH_INTERVAL_MS:900000}

# --- Database ------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${MARKET_SERVICE_DB_HOST:postgres}:${MARKET_SERVICE_DB_PORT:5432}/${MARKET_SERVICE_DB_NAME:market_service}
spring.datasource.username=${MARKET_SERVICE_DB_USER}
spring.datasource.password=${MARKET_SERVICE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.contexts=${LIQUIBASE_CONTEXTS:dev}
