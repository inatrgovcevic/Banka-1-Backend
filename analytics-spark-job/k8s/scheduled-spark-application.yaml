#noinspection KubernetesUnknownResourcesInspection
apiVersion: sparkoperator.k8s.io/v1beta2
#noinspection KubernetesUnknownResourcesInspection
kind: ScheduledSparkApplication
metadata:
  name: banka-analytics-spark
  namespace: default
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulRunHistoryLimit: 3
  failedRunHistoryLimit: 3
  template:
    type: Python
    mode: cluster
    image: banka1/analytics-spark-job:latest
    imagePullPolicy: IfNotPresent
    mainApplicationFile: local:///opt/spark/work-dir/analytics_job.py
    sparkVersion: 3.5.3
    restartPolicy:
      type: OnFailure
      onFailureRetries: 1
      onFailureRetryInterval: 60
      onSubmissionFailureRetries: 1
      onSubmissionFailureRetryInterval: 60
    deps:
      packages:
        - org.postgresql:postgresql:42.7.4
    driver:
      cores: 1
      coreLimit: "1200m"
      memory: "1g"
      serviceAccount: spark
      env:
        - name: TRADING_JDBC_URL
          value: jdbc:postgresql://postgres:5432/trading
        - name: MARKET_JDBC_URL
          value: jdbc:postgresql://postgres:5432/market_service
        - name: TRADING_DB_USER
          valueFrom:
            secretKeyRef:
              name: banka-analytics-db
              key: trading-user
        - name: TRADING_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: banka-analytics-db
              key: trading-password
        - name: MARKET_DB_USER
          valueFrom:
            secretKeyRef:
              name: banka-analytics-db
              key: market-user
        - name: MARKET_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: banka-analytics-db
              key: market-password
        - name: ANALYTICS_KMEANS_K
          value: "4"
    executor:
      instances: 2
      cores: 1
      memory: "1g"
      env:
        - name: TRADING_JDBC_URL
          value: jdbc:postgresql://postgres:5432/trading
        - name: MARKET_JDBC_URL
          value: jdbc:postgresql://postgres:5432/market_service
        - name: TRADING_DB_USER
          valueFrom:
            secretKeyRef:
              name: banka-analytics-db
              key: trading-user
        - name: TRADING_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: banka-analytics-db
              key: trading-password
        - name: MARKET_DB_USER
          valueFrom:
            secretKeyRef:
              name: banka-analytics-db
              key: market-user
        - name: MARKET_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: banka-analytics-db
              key: market-password
