spring.datasource.url=jdbc:h2:mem:banking-service-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.liquibase.enabled=false
server.port=0

jwt.secret=test-secret-key-that-is-long-enough-for-hmac-256-algorithm
banka.security.issuer=banka1
banka.security.id=id
banka.security.expiration-time=3600000
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.permit-all=/v3/api-docs/**,/swagger-ui/**

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false
spring.rabbitmq.listener.simple.default-requeue-rejected=false

rabbitmq.exchange=test-exchange
rabbitmq.queue=test-queue
rabbitmq.routing-key=test-routing-key
notification.rabbit.exchange=test-exchange
card.rabbit.auto.exchange=test-exchange
card.rabbit.auto.queue=test-card-auto-queue
card.rabbit.auto.routing-key=card.create
card.creation.automatic.default-limit=1000000

services.user.url=http://localhost:9001
services.client.url=http://localhost:9001
services.verification.url=http://localhost:9002
services.exchange.url=http://localhost:9003
services.account.url=http://localhost:9004
services.card.url=http://localhost:9005

my.random.seed=12345

management.otlp.metrics.export.enabled=false
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
