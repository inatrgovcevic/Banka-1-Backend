spring.application.name=userService
server.port=${SERVER_PORT:8081}

# PR_19 C19.X: dozvoljava override-ovanje duplikat @Bean definicija iz legacy modula.
spring.main.allow-bean-definition-overriding=true

# PR_32 Phase 13: interbank payload-i moraju da koriste BigDecimal za sve novcane iznose
# (Money/Quantity/Price field-ovi u InterbankEnvelope su BigDecimal), kako bi se izbeglo
# tiho gubljenje preciznosti pri deserialization-u JSON brojeva u double/float.
spring.jackson.deserialization.use-big-decimal-for-floats=true

# --- Security (zajednicki: employee i client koriste isti JWT secret) -------
jwt.secret=${JWT_SECRET}
banka.security.issuer=banka1
banka.security.id=id
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
# ms — access token
banka.security.expiration-time=3600000
# days — refresh token (PR_01 C1.7)
token.refresh.expiration-time=${TOKEN_REFRESH_EXPIRATION_DAYS:7}
# minutes — activation/confirmation token
token.confirmation.expiration-time=15

# Account lockout (Celina 1, Scenario 5) — primenjuje se na employee login flow
account.lockout.max-attempts=5
account.lockout.duration-minutes=15

# Rate limiting (primenjuje se na client public endpoint-e)
rate-limit.max-requests=10
rate-limit.window-ms=60000

# Permit-all spaja oba seta ruta:
#   - /employees/auth/* (login)
#   - /clients/auth/{login,activate,reset-password,forgot-password,resend-activation,check-activate}
#   - swagger + actuator probes (PR_01 C1.2)
banka.security.permit-all=/employees/auth/*,/clients/auth/login,/clients/auth/check-activate,/clients/auth/activate,/clients/auth/reset-password,/clients/auth/forgot-password,/clients/auth/resend-activation,/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html,/actuator/health/liveness,/actuator/health/readiness,/actuator/info,/internal/otc/**

# --- Swagger / OpenAPI (PR_01 C1.5) ---------------------------------------
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.config-url=/users/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/users/v3/api-docs
server.forward-headers-strategy=FRAMEWORK

# --- URL templates za email-link generaciju ------------------------------
url.reset-password=${USER_RESET_PASSWORD_URL:http://localhost:3000/reset-password?token=}
url.activate-account=${USER_ACTIVATE_ACCOUNT_URL:http://localhost:3000/activate?token=}

# --- Actuator (PR_01 C1.2) ------------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.readiness.include=readinessState,db,rabbit

# --- Observability (OTEL) -------------------------------------------------
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
company.observability.starter.user-id-mdc-enabled=true

# --- RabbitMQ -------------------------------------------------------------
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
rabbitmq.queue=${NOTIFICATION_QUEUE}
rabbitmq.exchange=${NOTIFICATION_EXCHANGE}
rabbitmq.routing-key=${NOTIFICATION_ROUTING_KEY}

# --- Database (jedinstvena DB za employees + clients posle merge-a, PR_02 C2.6) -----
spring.datasource.url=jdbc:postgresql://${USER_SERVICE_DB_HOST:user-service-db}:${USER_SERVICE_DB_PORT:5432}/${USER_SERVICE_DB_NAME:user_service}
spring.datasource.username=${USER_SERVICE_DB_USER}
spring.datasource.password=${USER_SERVICE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Liquibase hendluje DDL; Hibernate samo validira.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
# PR_01 C1.3: dev seed se izvršava samo kada je context "dev"; production deploy mora postaviti LIQUIBASE_CONTEXTS=prod.
spring.liquibase.contexts=${LIQUIBASE_CONTEXTS:dev}
